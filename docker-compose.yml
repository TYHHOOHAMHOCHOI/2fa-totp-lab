# ─── docker-compose.yml — 2FA TOTP Lab ────────────────────────────
# Chạy: docker-compose up --build
# Truy cập: http://localhost:8080
# ──────────────────────────────────────────────────────────────────

version: '3.9'

services:

  # ─── PostgreSQL Database ──────────────────────────────────────────
  db:
    image: postgres:13-alpine
    container_name: 2fa_lab_db
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres123}
      POSTGRES_DB:       ${POSTGRES_DB:-twofadb}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"   # 5433 trên host → 5432 trong container (tránh xung đột với PostgreSQL local)
    networks:
      - app-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-twofadb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Flask Web Application ────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 2fa_lab_web
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      # URL kết nối DB — dùng tên service 'db' (Docker DNS nội bộ)
      DATABASE_URL:    postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres123}@db:5432/${POSTGRES_DB:-twofadb}
      SECRET_KEY:      ${SECRET_KEY:-super-secret-key-CHANGE-IN-PRODUCTION-2024!}
      FLASK_ENV:       ${FLASK_ENV:-production}
    depends_on:
      db:
        condition: service_healthy   # Chờ DB sẵn sàng mới khởi động web
    networks:
      - app-network
    volumes:
      - ./app/static:/app/app/static:ro   # Mount static files

# ─── Volumes ──────────────────────────────────────────────────────
volumes:
  pgdata:
    driver: local

# ─── Networks ─────────────────────────────────────────────────────
networks:
  app-network:
    driver: bridge
